model = "gpt-5.4"
# Codex CLI config - US4 V6 Apple Edition
#
# Lido automaticamente pelo Codex CLI quando rodado nesta pasta de trabalho.
# Mantenha em sync com AGENTS.md, CLAUDE.md e .github/copilot-instructions.md.

[sandbox]
mode = "workspace-write"

[approval]
policy = "on-request"

[history]
max_entries = 0

[features]
goals = true

[shell]
safe_commands = [
  "cmake --build build",
  "ctest --test-dir build --output-on-failure",
  "npx playwright test",
  "npm test",
  "npm run lint",
  "git status",
  "git diff",
  "git log",
  "gh pr view",
  "gh run list",
]
